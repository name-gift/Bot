<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhận Key</title>

<!-- CSS -->
  <link rel="stylesheet" href="nhankeystyle.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1 id="title">🔑 Nhận Key</h1>

        <button id="getBtn">
            Nhận Key
        </button>

        <div id="searchBox">

            <h3>Hãy tìm kiếm cụm từ sau:</h3>

            <p id="question"></p>

            <input
                type="text"
                id="keyword"
                placeholder="Nhập đúng cụm từ ở trên..."
            >

            <button id="searchBtn">
                Xác Nhận
            </button>

        </div>

        <div id="keyArea">

            <h2>🎉 Key của bạn</h2>

            <div class="key" id="generatedKey">
               KEY
            </div>

            <button id="copyBtn" style="margin-top:10px;display:none;background:#f59e0b;color:white;">
              📋 Sao chép Key
            </button>

            <a href="linkvideo.html?page=1" class="back-link">
                ➜ Về trang link
            </a>

        </div>

    </div>

</div>

<div class="timer-container" id="timerBox">
    <div class="circle" id="timer">60</div>
</div>

<script>

let questions = [];

let currentQuestion = "";

function showToast(text){

    const toast =
    document.getElementById("toast");

    if(!toast) return;

    toast.innerHTML = text;
    toast.style.display = "block";

    setTimeout(()=>{
        toast.style.display = "none";
    },2000);

}

function generateKey(length = 7){

    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    let result = "";

    for(let i = 0; i < length; i++){
        result += chars.charAt(
            Math.floor(Math.random() * chars.length)
        );
    }

    return result;
}

async function loadQuestions(){

    try{

        const res = await fetch(
            "https://bot-api3.abcd1601ab.workers.dev/?type=questions"
        );

        questions = await res.json();

        console.log(questions);

    }catch(err){

        console.error(err);

        questions = [];

    }

}

loadQuestions();

const pageId =
new URLSearchParams(location.search)
.get("id");

const getBtn =
document.getElementById("getBtn");

// Kiểm tra cooldown 10 phút
const savedTime =
Number(
    localStorage.getItem(
        "received_key_" + pageId
    )
);

if(!isNaN(savedTime) && savedTime > 0){
    const endTime =
    Number(savedTime) + 600000;

    function updateCooldown(){

        const remain =
        endTime - Date.now();

        if(remain <= 0){

            localStorage.removeItem(
                "received_key_" + pageId
            );

            getBtn.disabled = false;
            getBtn.innerHTML = "🔑 Nhận Key";

            clearInterval(cooldownTimer);

            return;
        }

        const mins =
        Math.floor(remain / 60000);

        const secs =
        Math.floor((remain % 60000) / 1000);

        getBtn.disabled = true;

        getBtn.innerHTML =
        `⏳ ${mins}:${secs
            .toString()
            .padStart(2,"0")}`;
    }

    updateCooldown();

    const cooldownTimer =
    setInterval(updateCooldown,1000);
}

getBtn.onclick = () => {

    if(getBtn.disabled) return;

    if(questions.length === 0){

        showToast(
            "❌ Chưa tải được danh sách từ khóa"
        );

        return;
    }

    const randomIndex =
    Math.floor(
        Math.random() * questions.length
    );

    currentQuestion =
    questions[randomIndex].toUpperCase();

    document.getElementById("question")
    .textContent =
    currentQuestion;

    document.getElementById("title")
    .style.display = "none";

    getBtn.style.display = "none";

    document.getElementById("searchBox")
    .style.display = "block";
};
  
document.getElementById("keyword").addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        document.getElementById("searchBtn").click();
    }

});

document.getElementById("searchBtn").onclick = () => {

    const value =
    document.getElementById("keyword")
    .value
    .trim()
    .toUpperCase();

    if(value !== currentQuestion){

    showToast("❌ Từ khóa không chính xác!");

    return;
}

    document.getElementById("keyword").disabled = true;
    document.getElementById("searchBtn").disabled = true;

    document.getElementById("timerBox").style.display = "block";

    let time = 60;

    const timer =
    document.getElementById("timer");

    timer.textContent = time;

    const countdown = setInterval(() => {

        time--;

        timer.textContent = time;

        if(time <= 0){

        clearInterval(countdown);

         document.getElementById("timerBox").style.display = "none";

         loadKeyFromAPI();

        }

    },1000);
};

function loadKeyFromAPI(){

    const id =
    new URLSearchParams(location.search)
    .get("id");

    fetch(
      `https://bot-api3.abcd1601ab.workers.dev/?type=key&id=${id}`
    )
    .then(res => res.json())
    .then(data => {

        document.getElementById("generatedKey").textContent =
        data.key || "Không có Key";

        document.getElementById("copyBtn").style.display =
        "block";

        const keyArea =
        document.getElementById("keyArea");

        keyArea.style.display = "block";

        keyArea.animate(
        [
            {
                opacity:0,
                transform:"scale(0.6)"
            },
            {
                opacity:1,
                transform:"scale(1)"
            }
        ],
        {
            duration:800,
            easing:"ease-out"
        });

        localStorage.setItem(
    "received_key_" + id,
    Date.now()
);

    })
    .catch(error => {

        console.error(error);

        document.getElementById("generatedKey").textContent =
        "Lỗi tải Key";

        document.getElementById("keyArea").style.display =
"block";

localStorage.setItem(
    "received_key_" + id,
    Date.now()
);

    });

}
  
document.getElementById("copyBtn").onclick = async () => {

    const key =
    document.getElementById("generatedKey").textContent;

    try{

        await navigator.clipboard.writeText(key);

        document.getElementById("copyBtn").textContent =
        "✅ Đã sao chép";

        setTimeout(()=>{
            document.getElementById("copyBtn").textContent =
            "📋 Sao chép Key";
        },2000);

    }catch(err){

        showToast("❌ Không thể sao chép!");

    }

};

</script>

<div id="toast" class="toast"></div>

</body>
</html>
