<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhận Key Xem Video</title>

<!-- CSS -->
  <link rel="stylesheet" href="linkvideostyle.css">
</head>
<body>
    
<div class="container">

    <h1>📺 Danh Sách Video VIP</h1>

    <div id="videoList">
        <div class="loading">⏳ Đang tải danh sách video...</div>
    </div>

    <a href="index.html" class="login-btn">
        🔑 Đã Có Key? Nhập Key Tại Đây
    </a>

</div>

<script>

const urlParams = new URLSearchParams(location.search);
const page = Number(urlParams.get("page")) || 1;

function loadVideos(){

    fetch(
      "https://bot-api3.abcd1601ab.workers.dev/?type=video&secret=BOT_VIDEO"
    )
    .then(res => res.json())
    .then(videos => {

        const perPage = 6;

        const start = (page - 1) * perPage;
        const end = start + perPage;

        const pageVideos = videos.slice(start, end);

        let html = "";

        pageVideos.forEach(video => {

            html += `
            <div class="video">
                <span>${video.ten}</span>

                <a class="btn key-btn"
                   href="nhankey.html?id=${video.id}">
                   🔑 Nhận Key
                </a>
            </div>
            `;

        });

        const totalPages =
Math.ceil(videos.length / perPage);

html += `<div class="pagination">`;

html += `
<a href="?page=1"
class="page-btn ${page===1?'active':''}">
1
</a>
`;

if(totalPages > 1){

    if(totalPages <= 7){

        for(let i=2;i<=totalPages;i++){

            html += `
            <a href="?page=${i}"
            class="page-btn ${page===i?'active':''}">
            ${i}
            </a>
            `;
        }

    }else{

        if(page <= 4){

            for(let i=2;i<=5;i++){

                html += `
                <a href="?page=${i}"
                class="page-btn ${page===i?'active':''}">
                ${i}
                </a>
                `;
            }

            html += `
            <span class="dots">...</span>
            `;

            html += `
            <a href="?page=${totalPages}"
            class="page-btn">
            ${totalPages}
            </a>
            `;

        }else if(page >= totalPages - 3){

            html += `
            <span class="dots">...</span>
            `;

            for(let i=totalPages-4;i<=totalPages;i++){

                html += `
                <a href="?page=${i}"
                class="page-btn ${page===i?'active':''}">
                ${i}
                </a>
                `;
            }

        }else{

            html += `
            <span class="dots">...</span>
            `;

            for(let i=page-1;i<=page+1;i++){

                html += `
                <a href="?page=${i}"
                class="page-btn ${page===i?'active':''}">
                ${i}
                </a>
                `;
            }

            html += `
            <span class="dots">...</span>
            `;

            html += `
            <a href="?page=${totalPages}"
            class="page-btn">
            ${totalPages}
            </a>
            `;
        }
    }
}

html += `
</div>

<div class="goto-box">

    <input
      id="gotoInput"
      type="number"
      min="1"
      max="${totalPages}"
      value="${page}"
    >

    <span>/ ${totalPages}</span>

    <button onclick="gotoPage()">
      Đi đến
    </button>

</div>
`;
        document.getElementById("videoList").innerHTML = html;

    })
    .catch(error => {

        document.getElementById("videoList").innerHTML =
        '<div class="loading">❌ Không tải được danh sách video</div>';

    });

}

loadVideos();
function gotoPage(){

    const p =
    document.getElementById(
      "gotoInput"
    ).value;

    if(!p) return;

    location.href =
    "?page=" + p;
}
setInterval(loadVideos,10000);

</script>

</body>
</html>
