<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT START KEY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ==================== SCRIPT CHUYỂN SANG LOADING ==================== -->
<script>
/* CHỈ NHẢY SANG LOADING 1 LẦN */
if (!sessionStorage.getItem("fromLoading")) {
    sessionStorage.setItem("fromLoading", "1");
    setTimeout(() => {
        window.location.replace("loading.html");
    }, 300); // 300ms delay trước khi hiển thị loading
}
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#08111f,#0f1729,#0b1220);
height:100vh;
color:white;
overflow:hidden;
}

.chat{
height:100vh;
display:flex;
flex-direction:column;
}

.top{
padding:15px;
background:#101827;
display:flex;
align-items:center;
gap:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* COMMANDS */

.cmds{
display:flex;
gap:10px;
padding:12px;
background:#0f1729;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.cmdBtn{
background:#182235;
padding:12px 18px;
border-radius:14px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.cmdBtn:hover{
background:#00bfff;
}

.messages{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
padding:15px;
margin:10px 0;
border-radius:18px;
max-width:80%;
line-height:1.6;
word-wrap:break-word;
animation:show .2s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.bot{
background:#182235;
}

.user{
margin-left:auto;
background:linear-gradient(45deg,#00bfff,#0066ff);
}

.inputBox{
display:flex;
gap:10px;
padding:15px;
background:#101827;
}

.inputBox input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
background:#182235;
color:white;
outline:none;
}

.inputBox button{
width:110px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#00bfff,#0066ff);
color:white;
font-weight:700;
cursor:pointer;
}

code{
background:#0f1729;
padding:5px 10px;
border-radius:10px;
display:inline-block;
margin-top:5px;
color:#7dffb3;
}

a{
text-decoration:none;
}

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#00bfff;
border-radius:10px;
}

</style>
</head>
<body>

<div class="chat">

<div class="top">

<div class="avatar">
<img src="https://i.imgur.com/Z7AzH2c.jpg">
</div>

<div>
<b>BOT START KEY</b><br>
<small id="statusText">🟢 Online</small>
</div>

</div>

<!-- COMMAND BUTTON -->

<div class="cmds">

<div class="cmdBtn"
onclick="autoStart()">
/start
</div>

</div>

<div class="messages" id="messages"></div>

<div class="inputBox">

<input id="msg" placeholder="Nhập key...">

<button onclick="send()">
Gửi
</button>

</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxa6568yT8EIZ-Yl0axmK8VyBvieFC8GzEgspBPNwIvzCnVOw23paK6mUSpyofnS9Hr/exec";

let maintenance =
localStorage.getItem("maintenance") == "true";

if(maintenance){

statusText.innerHTML =
"🛠 Đang bảo trì";

}

function addMsg(text,type){

let div =
document.createElement("div");

div.className =
"msg " + type;

div.innerHTML = text;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;
}

/* AUTO START */

function autoStart(){

msg.value="/start ";

msg.focus();

}

msg.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
send();
}

});

addMsg(`
✨ Xin chào<br><br>

Nhập key bằng lệnh:<br><br>

<code>/start KEY</code>
`,"bot");

async function send(){

let text =
msg.value.trim();

if(text=="") return;

addMsg(text,"user");

msg.value="";

if(maintenance){

addMsg(`
🛠 BOT ĐANG BẢO TRÌ
`,"bot");

return;
}

if(text.startsWith("/start")){

let parts =
text.split(" ");

if(parts.length < 2){

addMsg(`
❌ Vui lòng nhập key
`,"bot");

return;
}

let key =
parts[1];

let res =
await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getKey",
key
})
});

let data =
await res.json();

if(data.status=="found"){

addMsg(`

✅ KEY HỢP LỆ<br><br>

🔑 <b>${key}</b><br><br>

⏰ ${
data.expire=="never"
? "Vĩnh viễn"
: data.expire
}<br><br>

<a href="${data.link}"
target="_blank"
style="
display:inline-block;
padding:12px 18px;
background:linear-gradient(45deg,#00ff99,#00bfff);
border-radius:12px;
color:#08111f;
font-weight:700;
">

👉 MỞ LINK

</a>
`,"bot");

}

else if(data.status=="expired"){

addMsg(`

<div style="color:#ff6b6b;">

❌ KEY ĐÃ HẾT HẠN<br><br>

🔑 <b>${key}</b><br><br>

<div style="
background:#3a1111;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
color:#ff4d4d;
cursor:not-allowed;
">

🚫 LINK ĐÃ KHÓA

</div>

</div>

`,"bot");

}

else{

addMsg(`
❌ KEY KHÔNG TỒN TẠI
`,"bot");

}

}

else{

addMsg(`
❌ Sai lệnh<br><br>

<code>/start KEY</code>
`,"bot");

}

}

</script>

</body>
</html>
