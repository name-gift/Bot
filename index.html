<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT START KEY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ==================== SCRIPT CHUYỂN SANG LOADING ==================== -->
<script>
/* CHỈ NHẢY SANG LOADING 1 LẦN */
if (!sessionStorage.getItem("fromLoading")) {
    sessionStorage.setItem("fromLoading", "1");
    setTimeout(() => {
        window.location.replace("loading.html");
    }, 300); // 300ms delay trước khi hiển thị loading
}
</script>

<!-- CSS -->
  <link rel="stylesheet" href="botstartstyle.css">
</head>
<body>

<div id="maintOverlay" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
">

<div style="
background:#101827;
padding:30px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.05);
max-width:350px;
width:100%;
">

<div style="
font-size:55px;
margin-bottom:15px;
">
🛠
</div>

<h2 style="
margin-bottom:10px;
">
BOT ĐANG BẢO TRÌ
</h2>

<div style="
color:#9ca3af;
line-height:1.6;
margin-top:8px;
">
Vui lòng quay lại sau
</div>

<div id="maintTime" style="
margin-top:12px;
font-size:18px;
font-weight:700;
color:#00bfff;
">
⏳ Đang tải...
</div>

<div
onclick="location.reload()"
style="
margin-top:18px;
display:inline-block;
padding:12px 22px;
border-radius:14px;
background:linear-gradient(45deg,#00bfff,#0066ff);
font-weight:700;
cursor:pointer;
transition:.2s;
">

🔄 TẢI LẠI TRANG

</div>

<div
onclick="window.open('linkvideo.html?page=1','_blank')"
style="
margin-top:12px;
display:inline-block;
padding:12px 22px;
border-radius:14px;
background:linear-gradient(45deg,#22c55e,#16a34a);
font-weight:700;
cursor:pointer;
">

🎬 TRANG PHIM

</div>

</div>

</div>

<div class="chat">

<div class="top">
    <div class="avatar">
        <img src="https://i.imgur.com/Z7AzH2c.jpg">
    </div>

    <div class="info">
        <h2>BOT START KEY</h2>
        <p id="statusText">🟢 Online</p>
    </div>
</div>

<!-- COMMAND BUTTON -->

<div class="cmds">

<div class="cmdBtn"
onclick="autoStart()">
/start
</div>

<div class="cmdBtn"
onclick="window.open('linkvideo.html?page=1','_blank')">
🎬 Trang Phim
</div>

</div>

<div class="messages" id="messages"></div>

<div class="inputBox">

<input id="msg" placeholder="Nhập key...">

<button onclick="send()">
Gửi
</button>

</div>

</div>

<script>

const API =
"https://bot-api.abcd1601ab.workers.dev/";

let maintenance = false;

async function loadMaintenance(){

    let res = await fetch(API,{
        method:"POST",
        body:JSON.stringify({
            action:"getMaintenance"
        })
    });

    let data = await res.json();

    maintenance = data.maintenance;

    if(data.maintenanceUntil){

    const end = Number(data.maintenanceUntil);

    clearInterval(window.maintTimer);

    window.maintTimer = setInterval(()=>{

        const diff = end - Date.now();

        if(diff <= 0){

            maintTime.innerHTML =
            "✅ Đã kết thúc bảo trì";

            clearInterval(window.maintTimer);

            return;
        }

        const hours =
        Math.floor(diff / 3600000);

        const mins =
        Math.floor((diff % 3600000) / 60000);

        const secs =
        Math.floor((diff % 60000) / 1000);

        maintTime.innerHTML =
       `⏳ ${hours}h ${mins}m ${secs}s`;
    },1000);

}
    statusText.innerHTML =
        maintenance
        ? "🛠 Đang bảo trì"
        : "🟢 Online";

    if(maintenance){
        document.querySelector(".chat").style.display = "none";
        maintOverlay.style.display = "flex";
    }else{
        document.querySelector(".chat").style.display = "flex";
        maintOverlay.style.display = "none";
    }
}

loadMaintenance();

setInterval(loadMaintenance,10000);

function addMsg(text,type){

let div =
document.createElement("div");

div.className =
"msg " + type;

div.innerHTML = text;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;
}

/* AUTO START */

function autoStart(){

msg.value="/start ";

msg.focus();

}

msg.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
send();
}

});

addMsg(`
✨ Xin chào<br><br>

Nhập key bằng lệnh:<br><br>

<code>/start KEY</code>
`,"bot");

async function send(){

let text =
msg.value.trim();

if(text=="") return;

addMsg(text,"user");

msg.value="";

if(maintenance){

addMsg(`
🛠 BOT ĐANG BẢO TRÌ
`,"bot");

return;
}

if(text.startsWith("/start")){

let parts =
text.split(" ");

if(parts.length < 2){

addMsg(`
❌ Vui lòng nhập key
`,"bot");

return;
}

let key =
parts[1];

let res =
await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getKey",
key
})
});

let data =
await res.json();

if(data.status=="found"){

addMsg(`

✅ KEY HỢP LỆ<br><br>

🔑 <b>${key}</b><br><br>

⏰ ${
data.expire=="never"
? "Vĩnh viễn"
: new Date(data.expire)
.toLocaleString("vi-VN")
}<br><br>

const token =
Date.now().toString(36) +
Math.random().toString(36).slice(2);

sessionStorage.setItem(
"video_token",
token
);

const videoUrl =
data.link +
(
data.link.includes("?")
? "&"
: "?"
) +
"token=" +
encodeURIComponent(token);

addMsg(`

✅ KEY HỢP LỆ<br><br>

🔑 <b>${key}</b><br><br>

⏰ ${
data.expire=="never"
? "Vĩnh viễn"
: new Date(data.expire)
.toLocaleString("vi-VN")
}<br><br>

<a href="${videoUrl}"
target="_blank"
style="
display:inline-block;
padding:12px 18px;
background:linear-gradient(45deg,#00ff99,#00bfff);
border-radius:12px;
color:#08111f;
font-weight:700;
">

👉 MỞ LINK

</a>

`,"bot");

}

else if(data.status=="expired"){

addMsg(`

<div style="color:#ff6b6b;">

❌ KEY ĐÃ HẾT HẠN<br><br>

🔑 <b>${key}</b><br><br>

<div style="
background:#3a1111;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
color:#ff4d4d;
cursor:not-allowed;
">

🚫 LINK ĐÃ KHÓA

</div>

</div>

`,"bot");

}

else{

addMsg(`
❌ KEY KHÔNG TỒN TẠI
`,"bot");

}

}

else{

addMsg(`
❌ Sai lệnh<br><br>

<code>/start KEY</code>
`,"bot");

}

}

</script>

</body>
</html>
