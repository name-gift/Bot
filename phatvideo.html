<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xem Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111827;
    font-family:sans-serif;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:12px;
}

.player-box{
    width:100%;
    aspect-ratio:16/9;
    border-radius:12px;
    overflow:hidden;
    background:#000;
    box-shadow:0 4px 20px rgba(0,0,0,.4);
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

@media (max-width:768px){

    .container{
        padding:8px;
    }

    .player-box{
        border-radius:8px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="player-box">
        <iframe id="player" allowfullscreen></iframe>
    </div>

</div>

<script>
const slug =
  new URLSearchParams(location.search).get("slug") || "tap0";

document.getElementById("player").src =
  "https://bot-api-phatvideo.abcd1601ab.workers.dev/?slug=" +
  encodeURIComponent(slug);
</script>

</body>
</html>
