<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xem Video</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}
input{
  padding:12px;
  width:280px;
}
button{
  padding:12px 20px;
}
iframe{
  display:none;
  width:100vw;
  height:100vh;
  border:none;
}
</style>
</head>
<body>

<div id="login">
  <h2>🔑 Nhập Key</h2>
  <input id="key" placeholder="Nhập key">
  <button onclick="checkKey()">Xác nhận</button>
  <div id="msg"></div>
</div>

<iframe id="player" allowfullscreen></iframe>

<script>
<script>
async function checkKey() {

  const userKey =
    document.getElementById("key").value.trim();

  document.getElementById("login").style.display = "none";

  const player =
    document.getElementById("player");

  player.style.display = "block";

  const slug =
    new URLSearchParams(location.search).get("slug") || "tap0";

  player.src =
    "https://bot-api-phatvideo.abcd1601ab.workers.dev/?slug=" +
    encodeURIComponent(slug) +
    "&key=" +
    encodeURIComponent(userKey);
}
</script>
</script>

</body>
</html>
