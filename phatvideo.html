<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xem Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial,sans-serif;
}

/* Khung video */
.video-container{
    width:100%;
    background:#000;
}

.video-player{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    display:block;
}

/* Thông tin video */
.video-info{
    padding:15px;
}

.video-title{
    font-size:18px;
    font-weight:700;
    line-height:1.4;
}

.video-meta{
    color:#aaa;
    margin-top:6px;
    font-size:14px;
}

/* Landscape giống YouTube */
@media (orientation: landscape){

    body{
        overflow:hidden;
    }

    .video-container{
        position:fixed;
        inset:0;
        width:100vw;
        height:100vh;
        z-index:9999;
    }

    .video-player{
        width:100%;
        height:100%;
        aspect-ratio:auto;
    }

    .video-info{
        display:none;
    }
}
</style>
</head>
<body>

<div class="video-container">
    <iframe
        id="player"
        class="video-player"
        allowfullscreen>
    </iframe>
</div>

<div class="video-info">
    <div class="video-title">
        📺 Video VIP
    </div>

    <div class="video-meta">
        Name Gift • Xem trực tuyến
    </div>
</div>

<script>
const slug =
  new URLSearchParams(location.search).get("slug") || "tap0";

document.getElementById("player").src =
  "https://bot-api-phatvideo.abcd1601ab.workers.dev/?slug=" +
  encodeURIComponent(slug);
</script>

</body>
</html>
