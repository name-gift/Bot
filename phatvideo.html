<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Xem Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0f0f0f;
    --card:#181818;
    --text:#ffffff;
    --sub:#aaaaaa;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    min-height:100vh;
}

/* Khung video */
.video-container{
    width:100%;
    background:#000;
}

.video-player{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    display:block;
    background:#000;
}

/* Thông tin video */
.video-info{
    padding:15px;
}

.video-title{
    font-size:18px;
    font-weight:700;
    line-height:1.5;
}

.video-meta{
    color:var(--sub);
    font-size:13px;
    margin-top:8px;
}

/* Card */
.card{
    margin:12px;
    background:var(--card);
    border-radius:12px;
    padding:14px;
}

.card h3{
    font-size:15px;
    margin-bottom:8px;
}

.card p{
    color:var(--sub);
    font-size:13px;
    line-height:1.5;
}

/* Mobile */
@media (max-width:768px){

    .video-title{
        font-size:16px;
    }

    .video-meta{
        font-size:12px;
    }

    .card{
        margin:10px;
    }
}

/* Landscape giống YouTube */
@media (orientation:landscape){

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#000;
    }

    .video-container{
        position:fixed;
        inset:0;
        width:100vw;
        height:100vh;
        z-index:9999;
    }

    .video-player{
        width:100%;
        height:100%;
        aspect-ratio:auto;
    }

    .video-info,
    .card{
        display:none;
    }
}
</style>

</head>
<body>

<div class="video-container">
    <iframe
        id="player"
        class="video-player"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>
</div>

<div class="video-info">
    <div class="video-title">
        📺 Video VIP
    </div>

<div class="video-meta">
    Name Gift • Đang phát trực tuyến
</div>

</div>

<div class="card">
    <h3>Thông tin</h3>
    <p>
        Xoay ngang điện thoại để xem toàn màn hình.
    </p>
</div>

<script>
const token =
  new URLSearchParams(location.search)
  .get("token");

// Tạo DeviceID
let deviceId =
  localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = crypto.randomUUID();
  localStorage.setItem(
    "deviceId",
    deviceId
  );
}

if(!token){

  document.body.innerHTML = `
  <div style="
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#fff;
  font-size:24px;
  font-weight:bold;
  ">
  🚫 TRUY CẬP BỊ TỪ CHỐI
  </div>
  `;

  throw new Error("Blocked");
}

const slug =
  new URLSearchParams(location.search)
  .get("slug") || "tap0";

(async()=>{

  const res =
    await fetch(
      "https://bot-api.abcd1601ab.workers.dev/",
      {
        method:"POST",
        body:JSON.stringify({
          action:"checkVideoToken",
          token:token,
          deviceId:deviceId
        })
      }
    );

  const data =
  await res.json();

console.log("CHECK TOKEN:", data);
  if(data.status !== "success"){

    document.body.innerHTML = `
    <div style="
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    color:#ff4d4d;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    padding:20px;
    ">
    🚫 TOKEN KHÔNG HỢP LỆ<br><br>
    ${data.status}
    </div>
    `;

    return;
  }

  document.getElementById("player").src =
    "https://bot-api-phatvideo.abcd1601ab.workers.dev/?slug=" +
    encodeURIComponent(slug) +
    "&token=" +
    encodeURIComponent(token);

})();

</script>
</body>
</html>
